# Cloud Build CI/CD Pipeline — CardioSentries CDSS
steps:
  # 1. Build & Push Backend
  - name: 'gcr.io/cloud-builders/docker'
    id: 'Build Backend'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/backend-api:$COMMIT_SHA', './backend-service']

  # 2. Build & Push Frontend
  - name: 'gcr.io/cloud-builders/docker'
    id: 'Build Frontend'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/frontend:$COMMIT_SHA', './frontend-client']

  # 3. Build & Push AI Service
  - name: 'gcr.io/cloud-builders/docker'
    id: 'Build AI'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/ai-service:$COMMIT_SHA', './ai-service']

  # 4. Deploy Backend to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool'
    id: 'Deploy Backend'
    entrypoint: 'gcloud'
    args: [
      'run', 'deploy', 'backend-api',
      '--image', 'gcr.io/$PROJECT_ID/backend-api:$COMMIT_SHA',
      '--region', 'us-central1',
      '--platform', 'managed',
      '--allow-unauthenticated',
      '--port', '3000',
      '--memory', '512Mi',
      '--cpu', '1',
      '--no-cpu-throttling',
      '--set-cloud-sql-instances', '$PROJECT_ID:us-central1:cardio-db',
      '--set-env-vars', 'APP_MODE=production,DB_HOST=10.0.0.4,DB_USER=root,DB_NAME=cardio_db,DB_PORT=3306,DB_PASSWORD=root1234,JWT_SECRET=f41a58458c68f1386d10722000cdbf23,ADMIN_USERNAME=admin_pusat,ADMIN_PASSWORD=password,AI_SERVICE_URL=https://ai-service-xxxxx-xxxxx.a.run.app',
      '--vpc-connector', 'projects/$PROJECT_ID/locations/us-central1/connectors/vpc-connector-backend',
    ]

  # 5. Deploy Frontend to Cloud Run
  - name: 'gcr.io/cloud-builders/docker'
    id: 'Deploy Frontend'
    entrypoint: 'gcloud'
    args: [
      'run', 'deploy', 'frontend',
      '--image', 'gcr.io/$PROJECT_ID/frontend:$COMMIT_SHA',
      '--region', 'us-central1',
      '--platform', 'managed',
      '--allow-unauthenticated',
      '--port', '80',
      '--memory', '128Mi',
    ]

  # 6. Deploy AI Service to Cloud Run
  - name: 'gcr.io/cloud-builders/docker'
    id: 'Deploy AI'
    entrypoint: 'gcloud'
    args: [
      'run', 'deploy', 'ai-service',
      '--image', 'gcr.io/$PROJECT_ID/ai-service:$COMMIT_SHA',
      '--region', 'us-central1',
      '--platform', 'managed',
      '--allow-unauthenticated',
      '--port', '8000',
      '--memory', '256Mi',
      '--vpc-connector', 'projects/$PROJECT_ID/locations/us-central1/connectors/vpc-connector-ai',
    ]

images:
  - 'gcr.io/$PROJECT_ID/backend-api:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/frontend:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/ai-service:$COMMIT_SHA'
